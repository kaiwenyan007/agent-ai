services:
  mysql:
    # 镜像地址见 .env（国内网络勿用 docker.io 直连）
    image: ${MYSQL_IMAGE}
    container_name: agent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agent_ai
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - agent_mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  agent_mysql_data:

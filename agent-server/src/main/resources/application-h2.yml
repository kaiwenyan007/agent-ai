# 免安装 MySQL：H2 内存库（快速体验 v0.1，表结构由 schema-h2.sql 初始化）
# 启动：mvn -pl agent-server spring-boot:run -Dspring-boot.run.profiles=h2

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:agent_ai;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

agent:
  datasource:
    mode: h2

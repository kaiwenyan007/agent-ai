spring:
  application:
    name: agent-ai
  profiles:
    active: dev

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.agent: debug

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  is-read-header: true
  is-read-cookie: false
  is-log: false
